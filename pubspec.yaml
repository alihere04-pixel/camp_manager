name: camp_manager
description: "Camp Internet System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
    

  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.8

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking & Utils
  url_launcher: ^6.3.0
  http: ^1.2.0

  # PDF Import
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^24.2.7
  path_provider: ^2.1.5
  share_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png